---
layout: default
---
<article class="doc">
  {% if page.title %}
    <header class="doc-header">
      {% if page.eyebrow %}<div class="eyebrow">{{ page.eyebrow }}</div>{% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.summary %}<p class="lede">{{ page.summary }}</p>{% endif %}
    </header>
  {% endif %}

  <div class="doc-body">
    {{ content }}
  </div>
</article>
